<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: opacity 1s ease-in-out;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }

        #clock {
            font-size: 120px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #date {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        #greeting {
            font-size: 32px;
            font-weight: 300;
            margin-top: 20px;
            opacity: 0.95;
        }

        .photo-credit {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .photo-credit:hover {
            opacity: 1;
        }

        .photo-credit a {
            color: white;
            text-decoration: none;
        }

        .photo-credit a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            #clock {
                font-size: 72px;
            }
            #date {
                font-size: 18px;
            }
            #greeting {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <div id="clock"></div>
        <div id="date"></div>
        <div id="greeting"></div>
    </div>

    <div class="photo-credit">
        Photo by <a href="https://unsplash.com" target="_blank" id="photographer">Unsplash</a>
    </div>

    <script>
        // Update clock
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');

            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours || 12; // convert 0 to 12 for midnight/noon

            const hourString = String(hours).padStart(2, '0');
            document.getElementById('clock').textContent = `${hourString}:${minutes} ${ampm}`;
        }

        // Update date
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Update greeting based on time of day
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting;

            if (hour < 12) {
                greeting = 'Good Morning';
            } else if (hour < 18) {
                greeting = 'Good Afternoon';
            } else {
                greeting = 'Good Evening';
            }
            greeting += ", Eric";

            document.getElementById('greeting').textContent = greeting;
        }

        // Load random background from Unsplash
        function loadBackground() {
            const background = document.getElementById('background');
            const photographer = document.getElementById('photographer');

            // Using Unsplash API - random photo from nature/landscape collection
            // Note: For production use, get a free API key from unsplash.com/developers
            const imageUrl = `https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&h=1080&fit=crop`;

            // Preload image
            const img = new Image();
            img.onload = function() {
                background.style.backgroundImage = `url('${imageUrl}')`;
                background.style.opacity = '1';
            };
            img.onerror = function() {
                // Fallback to a gradient if image fails to load
                background.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                background.style.opacity = '1';
            };
            img.src = imageUrl;

            photographer.textContent = 'Unsplash';
            photographer.href = 'https://unsplash.com';
        }

        // Initialize
        function init() {
            updateClock();
            updateDate();
            updateGreeting();
            loadBackground();

            // Update clock every second
            setInterval(updateClock, 1000);

            // Update date and greeting every minute
            setInterval(() => {
                updateDate();
                updateGreeting();
            }, 60000);
        }

        // Start when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
